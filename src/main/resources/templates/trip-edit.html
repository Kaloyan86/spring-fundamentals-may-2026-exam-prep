<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Edit Trip')}"></head>

<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<section class="form-section">

    <div class="form-card large">

        <h2>Edit Trip</h2>

        <form th:action="@{/trips/{id}/edit(id=${trip.id})}"
              method="post">

            <div class="form-group">

                <label>Destination</label>

                <input type="text"
                       name="destination"
                       th:value="${trip.destination}">

                <small class="error"
                       th:errors="*{destination}">
                </small>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea rows="6"
                          name="description"
                          th:text="${trip.description}">
                </textarea>

                <small class="error"
                       th:errors="*{description}">
                </small>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label>Start Date</label>

                    <input type="date"
                           name="startDate"
                           th:value="${trip.startDate}">

                </div>

                <div class="form-group">

                    <label>End Date</label>

                    <input type="date"
                           name="endDate"
                           th:value="${trip.endDate}">

                </div>

            </div>

            <button class="btn-primary">

                Save Changes

            </button>

        </form>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>

</html>
